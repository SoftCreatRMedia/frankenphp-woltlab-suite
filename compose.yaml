services:
  credential-init:
    image: alpine:3.22
    restart: "no"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-}"
      MYSQL_USER: "${MYSQL_USER:-}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-}"
    volumes:
      - wsc-secrets:/run/wsc-secrets
      - ./docker/generate-db-secrets.sh:/usr/local/bin/generate-db-secrets:ro
    command: ["sh", "/usr/local/bin/generate-db-secrets"]

  volume-init:
    image: alpine:3.22
    restart: "no"
    volumes:
      - wsc-public:/app/public
      - caddy-data:/data
      - caddy-config:/config
    command: ["sh", "-c", "chown -R 33:33 /app/public /data /config"]

  wsc:
    build:
      context: .
      args:
        PHP_VERSION: "${PHP_VERSION:-8.4}"
        DEBIAN_VERSION: "${DEBIAN_VERSION:-trixie}"
        WSC_REF: "${WSC_REF:-6.2.3}"
    image: "${WSC_IMAGE:-frankenphp-woltlab-suite}:${WSC_TAG:-6.2-php8.4}"
    restart: unless-stopped
    environment:
      SERVER_NAME: "${SERVER_NAME:-localhost}"
      WSC_REF: "${WSC_REF:-6.2.3}"
      WCFSETUP_DBHOST: "${WCFSETUP_DBHOST:-db}"
      WCFSETUP_DBNAME_FILE: "/run/wsc-secrets/db-name"
      WCFSETUP_DBUSER_FILE: "/run/wsc-secrets/db-user"
      WCFSETUP_DBPASSWORD_FILE: "/run/wsc-secrets/db-password"
      PHP_MEMORY_LIMIT: "${PHP_MEMORY_LIMIT:-512M}"
      PHP_UPLOAD_MAX_FILESIZE: "${PHP_UPLOAD_MAX_FILESIZE:-64M}"
      PHP_POST_MAX_SIZE: "${PHP_POST_MAX_SIZE:-64M}"
      PHP_MAX_EXECUTION_TIME: "${PHP_MAX_EXECUTION_TIME:-120}"
      PHP_OPCACHE_MEMORY_CONSUMPTION: "${PHP_OPCACHE_MEMORY_CONSUMPTION:-256}"
      PHP_OPCACHE_INTERNED_STRINGS_BUFFER: "${PHP_OPCACHE_INTERNED_STRINGS_BUFFER:-32}"
      PHP_OPCACHE_MAX_ACCELERATED_FILES: "${PHP_OPCACHE_MAX_ACCELERATED_FILES:-20000}"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-0}"
      PHP_OPCACHE_REVALIDATE_FREQ: "${PHP_OPCACHE_REVALIDATE_FREQ:-0}"
      FRANKENPHP_NUM_THREADS: "${FRANKENPHP_NUM_THREADS:-1}"
      FRANKENPHP_MAX_THREADS: "${FRANKENPHP_MAX_THREADS:-1}"
      FRANKENPHP_CONFIG: "${FRANKENPHP_CONFIG:-}"
      CADDY_GLOBAL_OPTIONS: "${CADDY_GLOBAL_OPTIONS:-}"
      CADDY_SERVER_EXTRA_DIRECTIVES: "${CADDY_SERVER_EXTRA_DIRECTIVES:-}"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443/tcp"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - wsc-public:/app/public
      - wsc-secrets:/run/wsc-secrets:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      credential-init:
        condition: service_completed_successfully
      volume-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 2019, $$errno, $$errstr, 2); if (!$$socket) exit(1); fwrite($$socket, \"GET /metrics HTTP/1.0\\r\\nHost: 127.0.0.1:2019\\r\\n\\r\\n\"); $$status = fgets($$socket); exit(str_contains($$status, \"200\") ? 0 : 1);'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: mariadb:lts
    restart: unless-stopped
    environment:
      MARIADB_DATABASE_FILE: "/run/wsc-secrets/db-name"
      MARIADB_USER_FILE: "/run/wsc-secrets/db-user"
      MARIADB_PASSWORD_FILE: "/run/wsc-secrets/db-password"
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-1G}
      - --innodb-file-per-table=1
      - --innodb-flush-log-at-trx-commit=1
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-300}
      - --skip-name-resolve=1
      - --table-open-cache=${MYSQL_TABLE_OPEN_CACHE:-4000}
      - --thread-cache-size=${MYSQL_THREAD_CACHE_SIZE:-64}
    volumes:
      - db-data:/var/lib/mysql
      - wsc-secrets:/run/wsc-secrets:ro
    depends_on:
      credential-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u\"$$(cat /run/wsc-secrets/db-user)\" -p\"$$(cat /run/wsc-secrets/db-password)\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  wsc-public:
  caddy-data:
  caddy-config:
  db-data:
  wsc-secrets:
